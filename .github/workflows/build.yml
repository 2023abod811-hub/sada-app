name: بناء تطبيق صدى

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: تحميل الكود
        uses: actions/checkout@v3
      
      - name: إعداد Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: تثبيت المكتبات
        run: npm install
      
      - name: تثبيت EAS CLI
        run: npm install -g eas-cli
      
      - name: بناء APK (محلي)
        run: |
          eas build --platform android --local --output=./app-release.apk || true
      
      - name: رفع ملف APK
        uses: actions/upload-artifact@v3
        with:
          name: sada-app-release
          path: app-release.apk
          if-no-files-found: ignore
      
      - name: إنشاء Release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          release_name: صدى v1.0.0 - Build ${{ github.run_number }}
          draft: false
          prerelease: false
