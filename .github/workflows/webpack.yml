name: بناء تطبيق صدى

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: إعداد Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: تثبيت المكتبات
        run: npm install -g eas-cli && npm install
      
      - name: بناء APK
        run: eas build --platform android --local
      
      - name: رفع الملف
        uses: actions/upload-artifact@v3
        with:
          name: app-release.apk
          path: dist/
